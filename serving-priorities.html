function articlesInCourse(courseId) {
  if (courseId === null) return articles.filter(a => a.courseId === null);
  return articles.filter(a => a.courseId === courseId);
}

function articleMatchesFilter(a, f) {
  if (f.field === 'course') {
    return f.values.some(v => (v === 'other' ? a.courseId === null : a.courseId === Number(v)));
  }
  if (f.field === 'displayCategory') return f.values.includes(a.displayCategory);
  if (f.field === 'productGroup') return f.values.includes(a.productGroup);
  return true;
}

function visibleArticles() {
  let list = articles.slice();
  filters.forEach(f => { list = list.filter(a => articleMatchesFilter(a, f)); });
  if (searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    list = list.filter(a =>
      a.name.toLowerCase().includes(q) ||
      a.displayCategory.toLowerCase().includes(q) ||
      a.productGroup.toLowerCase().includes(q)
    );
  }
  list.sort((a, b) => {
    let va, vb;
    if (sortKey === 'name') { va = a.name; vb = b.name; }
    else if (sortKey === 'displayCategory') { va = a.displayCategory; vb = b.displayCategory; }
    else if (sortKey === 'productGroup') { va = a.productGroup; vb = b.productGroup; }
    else if (sortKey === 'course') { va = courseNameFor(a.courseId); vb = courseNameFor(b.courseId); }
    const cmp = String(va).localeCompare(String(vb));
    return sortDir === 'asc' ? cmp : -cmp;
  });
  return list;
}

function courseNameFor(id) {
  if (id === null) return t('courses.other');
  const c = courses.find(c => c.id === id);
  return c ? c.name : t('courses.other');
}

function renderSidebar() {
  document.querySelectorAll('[data-i18n]').forEach(el => {

  });
  document.getElementById('modeLabel').textContent = t(isPopulated ? 'demo.populated' : 'demo.empty');

}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function render() {
  renderSidebar();

  if (courses.length === 0) {
    root.innerHTML = renderEmptyState();

  root.innerHTML = `
    <div class="panels">

function flatChips() {
  const out = [];
  filters.forEach(f => f.values.forEach(v => out.push({ field: f.field, value: v, label: filterValueLabel(f.field, v) })));
  return out;
}

function filterValueLabel(field, value) {
  if (field === 'course') {
    if (value === 'other') return t('courses.other');
    const c = courses.find(c => c.id === Number(value));
    return c ? c.name : String(value);
  }
  return String(value);
}

function uniqueFieldValues(field) {
  if (field === 'course') {
    const vals = courses.map(c => ({ value: String(c.id), label: c.name }));
    vals.push({ value: 'other', label: t('courses.other') });
    return vals;
  }
  if (field === 'displayCategory') {
    const set = new Set(articles.map(a => a.displayCategory));
    return Array.from(set).sort().map(v => ({ value: v, label: v }));
  }
  if (field === 'productGroup') {
    const set = new Set(articles.map(a => a.productGroup));
    return Array.from(set).sort().map(v => ({ value: v, label: v }));
  }
  return [];
}

function renderFilterPopover() {
  if (!filterMenuOpen) return '';
  const fieldOpts = [
    { value: '', label: t('filter.selectField') },
    { value: 'course', label: t('filter.field.course') },
    { value: 'displayCategory', label: t('filter.field.displayCategory') },
    { value: 'productGroup', label: t('filter.field.productGroup') }
  ];
  const fieldSelectHtml = fieldOpts.map(o =>
    `<option value="${o.value}" ${filterDraftField === o.value ? 'selected' : ''}>${escapeHtml(o.label)}</option>`
  ).join('');
  let valuesBlock = '';
  if (filterDraftField) {
    const vals = uniqueFieldValues(filterDraftField);
    const items = vals.map(v => {
      const checked = filterDraftValues.has(v.value);
      return `
        <label class="value-option ${checked ? 'selected' : ''}">
          <input type="checkbox" data-val="${escapeHtml(v.value)}" ${checked ? 'checked' : ''}>
          <span>${escapeHtml(v.label)}</span>
        </label>
      `;
    }).join('');
    valuesBlock = `
      <div class="value-group-label">${t('filter.valuesLabel')}</div>
      <div class="value-options">${items}</div>
    `;
  }
  const canCreate = filterDraftField && filterDraftValues.size > 0;
  return `
    <div class="filter-popover">
      <div class="popover-head">
        <span class="popover-title">${t('filter.title')}</span>
        <button class="popover-close" onclick="closeFilterMenu()">×</button>
      </div>
      <select id="fieldSelect" class="field-select">${fieldSelectHtml}</select>
      ${valuesBlock}
      <div class="popover-actions">
        <button class="btn-p" onclick="applyFilter()" ${canCreate ? '' : 'disabled'}>${t('filter.create')}</button>
      </div>
    </div>
  `;
}

function renderArticlesPanel() {
  const list = visibleArticles();
  const selectedCount = list.filter(a => selected.has(a.id)).length;
  const bulkOptions = [
    `<option value="">${t('bulk.choose')}</option>`,
    ...courses.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`),
    `<option value="other">${t('courses.other')}</option>`
  ].join('');
  const rows = list.length === 0
    ? `<tr><td colspan="5" style="text-align:center;color:#888;padding:40px 14px;">${t('articles.empty')}</td></tr>`
    : list.map(a => {
        const checked = selected.has(a.id) ? 'checked' : '';
        const selClass = selected.has(a.id) ? ' class="selected"' : '';
        return `
          <tr${selClass} data-row-aid="${a.id}">

          </tr>
        `;
      }).join('');
  const th = (key, label) => {
    const isSorted = sortKey === key;
    const arrow = isSorted ? (sortDir === 'asc' ? '↑' : '↓') : '↕';
    return `<th class="${isSorted ? 'sorted' : ''}" data-sort="${key}">${label} <span class="sort-arrow">${arrow}</span></th>`;
  };
  const isBulkActive = selected.size > 0;
  const bulkClass = isBulkActive ? 'active' : 'muted';

  const bulkBar = `
    <div class="bulk-bar ${bulkClass}">
      <div class="bulk-bar-left">

        <span>${t('bulk.assignTo')}</span>

      </div>
      ${isBulkActive ? `<button class="bulk-link" onclick="clearSelection()">${t('bulk.clear')}</button>` : ''}
    </div>
  `;
  const chips = flatChips();
  const chipsRow = chips.length > 0 ? `
    <div class="chips-row">
      ${chips.map(c => `
        <span class="chip-filter">
          ${escapeHtml(c.label)}
          <button class="chip-filter-close" onclick="removeChip('${c.field}','${escapeHtml(String(c.value))}')">×</button>
        </span>
      `).join('')}
    </div>
  ` : '';
  const filterIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 2h10l-3.7 4.5v4l-2.6-1v-3L1 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" fill="none"/></svg>`;
  return `
    <div class="panel articles-panel">
      <div class="articles-head">
        <div class="search-wrap">
          <span class="search-icon">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 8l2.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </span>
          <input id="searchInput" type="text" placeholder="${t('articles.search')}" value="${escapeHtml(searchQuery)}">
        </div>
        <div class="filter-btn-wrap">
          <button class="btn-filter" onclick="toggleFilterMenu()">${filterIcon} ${t('filter.addBtn')}</button>
          ${renderFilterPopover()}
        </div>
      </div>
      ${chipsRow}
      ${bulkBar}
      <div class="articles-scroll">
        <table class="articles-table">
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="selectAll" ${list.length > 0 && selectedCount === list.length ? 'checked' : ''}></th>

              ${th('displayCategory', t('articles.th.displayCategory'))}
              ${th('productGroup', t('articles.th.productGroup'))}

        </table>
      </div>
    </div>
  `;
}

function renderCourseDropdown(a) {
  const opts = courses.map(c =>
    `<option value="${c.id}" ${a.courseId === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
  ).join('');
  const otherOpt = `<option value="other" ${a.courseId === null ? 'selected' : ''}>${t('courses.other')}</option>`;
  const cls = a.courseId === null ? 'course-dropdown is-other' : 'course-dropdown';
  return `<select class="${cls}" data-aid="${a.id}" onchange="assignArticle(${a.id}, this.value)">${opts}${otherOpt}</select>`;
}

function attachHandlers() {
  const search = document.getElementById('searchInput');
  if (search) {
    search.addEventListener('input', e => {
      searchQuery = e.target.value;
      const pos = e.target.selectionStart;
      render();
      const s = document.getElementById('searchInput');
      if (s) { s.focus(); s.setSelectionRange(pos, pos); }
    });
  }
  const selectAll = document.getElementById('selectAll');
  if (selectAll) {
    selectAll.addEventListener('change', e => {
      const list = visibleArticles();
      if (e.target.checked) list.forEach(a => selected.add(a.id));
      else list.forEach(a => selected.delete(a.id));
      render();
    });
  }
  document.querySelectorAll('input[type="checkbox"][data-aid]').forEach(el => {
    el.addEventListener('change', e => {
      const id = Number(e.target.getAttribute('data-aid'));
      if (e.target.checked) selected.add(id);
      else selected.delete(id);
      render();
    });
  });
  document.querySelectorAll('tr[data-row-aid]').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('select') || e.target.closest('input')) return;
      const id = Number(row.getAttribute('data-row-aid'));
      if (selected.has(id)) selected.delete(id);
      else selected.add(id);
      render();
    });
  });
  document.querySelectorAll('.articles-table th[data-sort]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.getAttribute('data-sort');
      if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortKey = key; sortDir = 'asc'; }
      render();
    });
  });
  document.querySelectorAll('.course-del[data-cid]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = Number(el.getAttribute('data-cid'));
      askDeleteCourse(id);
    });
  });
  document.querySelectorAll('.course-row.draggable').forEach(el => {
    el.addEventListener('dragstart', handleDragStart);
    el.addEventListener('dragend', handleDragEnd);
    el.addEventListener('dragover', handleDragOver);
    el.addEventListener('dragleave', handleDragLeave);
    el.addEventListener('drop', handleDrop);
  });
  const addInput = document.getElementById('addInput');
  if (addInput) {
    addInput.addEventListener('input', e => {
      addFormValue = e.target.value;
      const btn = document.querySelector('.add-course-form .btn-p');
      if (btn) btn.disabled = !addFormValue.trim();
    });
    addInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && addFormValue.trim()) saveAdd();
      else if (e.key === 'Escape') cancelAdd();
    });
    addInput.focus();
    addInput.setSelectionRange(addInput.value.length, addInput.value.length);
  }
  const fieldSelect = document.getElementById('fieldSelect');
  if (fieldSelect) {
    fieldSelect.addEventListener('change', e => {
      filterDraftField = e.target.value;
      filterDraftValues = new Set();
      render();
    });
  }
  document.querySelectorAll('.value-option input[type="checkbox"][data-val]').forEach(el => {
    el.addEventListener('change', e => {
      const v = e.target.getAttribute('data-val');
      if (e.target.checked) filterDraftValues.add(v);
      else filterDraftValues.delete(v);
      render();
    });
  });
  if (filterMenuOpen) {
    setTimeout(() => { document.addEventListener('click', handleDocClickForFilter); }, 0);
  }
}

function handleDocClickForFilter(e) {
  if (!filterMenuOpen) { document.removeEventListener('click', handleDocClickForFilter); return; }
  if (!e.target.closest('.filter-btn-wrap')) {
    document.removeEventListener('click', handleDocClickForFilter);
    closeFilterMenu();
  }
}

function toggleFilterMenu() {
  filterMenuOpen = !filterMenuOpen;
  if (!filterMenuOpen) { filterDraftField = ''; filterDraftValues = new Set(); }
  render();
}
function closeFilterMenu() {
  filterMenuOpen = false;
  filterDraftField = '';
  filterDraftValues = new Set();
  render();
}
function applyFilter() {
  if (!filterDraftField || filterDraftValues.size === 0) return;
  const existing = filters.find(f => f.field === filterDraftField);
  const newValues = Array.from(filterDraftValues);
  if (existing) {
    newValues.forEach(v => { if (!existing.values.includes(v)) existing.values.push(v); });
  } else {
    filters.push({ field: filterDraftField, values: newValues });
  }
  closeFilterMenu();
}
function removeChip(field, value) {
  const f = filters.find(x => x.field === field);
  if (!f) return;
  f.values = f.values.filter(v => v !== value);
  if (f.values.length === 0) filters = filters.filter(x => x !== f);
  render();
}

function handleDragStart(e) {
  draggedCourseId = Number(e.currentTarget.getAttribute('data-cid'));
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function handleDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.course-row').forEach(r => r.classList.remove('drop-before', 'drop-after'));
  draggedCourseId = null;
}
function handleDragOver(e) {
  if (draggedCourseId === null) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  const targetId = Number(row.getAttribute('data-cid'));
  if (targetId === draggedCourseId) return;
  const rect = row.getBoundingClientRect();
  const before = e.clientY < rect.top + rect.height / 2;
  row.classList.toggle('drop-before', before);
  row.classList.toggle('drop-after', !before);
}
function handleDragLeave(e) {
  e.currentTarget.classList.remove('drop-before', 'drop-after');
}
function handleDrop(e) {
  if (draggedCourseId === null) return;
  e.preventDefault();
  const row = e.currentTarget;
  const targetId = Number(row.getAttribute('data-cid'));
  if (targetId === draggedCourseId) return;
  const rect = row.getBoundingClientRect();
  const before = e.clientY < rect.top + rect.height / 2;
  const fromIdx = courses.findIndex(c => c.id === draggedCourseId);
  const moved = courses.splice(fromIdx, 1)[0];
  const toIdx = courses.findIndex(c => c.id === targetId);
  courses.splice(before ? toIdx : toIdx + 1, 0, moved);
  render();
}

function openAddForm() { addFormOpen = true; addFormValue = ''; render(); }
function cancelAdd() { addFormOpen = false; addFormValue = ''; render(); }
function useTemplate(key) {
  addFormValue = t(key);
  render();
  setTimeout(() => { const i = document.getElementById('addInput'); if (i) i.focus(); }, 0);
}
function saveAdd() {
  const name = addFormValue.trim();
  if (!name) return;
  courses.push({ id: nextCourseId++, name });
  addFormOpen = false;
  addFormValue = '';
  render();
  showToast(t('toast.courseAdded', { name }));
}

function askDeleteCourse(id) {
  const c = courses.find(x => x.id === id);
  if (!c) return;
  const mount = document.getElementById('confirmMount');
  mount.innerHTML = `
    <div class="confirm-overlay" onclick="if(event.target===this)closeConfirm()">
      <div class="confirm-box">
        <div class="confirm-title">${t('confirm.delete.title', { name: escapeHtml(c.name) })}</div>
        <div class="confirm-desc">${t('confirm.delete.desc')}</div>
        <div class="confirm-actions">
          <button class="btn-g" onclick="closeConfirm()">${t('confirm.delete.cancel')}</button>
          <button class="btn-p" onclick="confirmDelete(${id})">${t('confirm.delete.confirm')}</button>
        </div>
      </div>
    </div>
  `;
}
function closeConfirm() { document.getElementById('confirmMount').innerHTML = ''; }
function confirmDelete(id) {
  const c = courses.find(x => x.id === id);
  if (!c) { closeConfirm(); return; }
  const name = c.name;
  articles.forEach(a => { if (a.courseId === id) a.courseId = null; });
  courses = courses.filter(x => x.id !== id);
  filters.forEach(f => {
    if (f.field === 'course') f.values = f.values.filter(v => v === 'other' || Number(v) !== id);
  });
  filters = filters.filter(f => f.values.length > 0);
  closeConfirm();
  render();
  showToast(t('toast.courseDeleted', { name }));
}

function assignArticle(aid, value) {
  const a = articles.find(x => x.id === aid);
  if (!a) return;
  a.courseId = value === 'other' ? null : Number(value);
  render();
}

function doBulkAssign(value) {
  if (!value || selected.size === 0) return;
  const targetId = value === 'other' ? null : Number(value);
  const targetName = targetId === null ? t('courses.other') : courses.find(c => c.id === targetId).name;
  let n = 0;
  selected.forEach(aid => {
    const a = articles.find(x => x.id === aid);
    if (a) { a.courseId = targetId; n++; }
  });
  selected = new Set();
  render();
  showToast(t('toast.assigned', { n, name: targetName }));
}

function clearSelection() { selected = new Set(); render(); }

function applyStandardTemplate() {
  courses = [
    { id: nextCourseId++, name: t('course.tpl.appetizers') },
    { id: nextCourseId++, name: t('course.tpl.mains') },
    { id: nextCourseId++, name: t('course.tpl.desserts') },
    { id: nextCourseId++, name: t('course.tpl.drinks') }
  ];
  render();
  showToast(t('toast.templateApplied'));
}
function startFromScratch() {
  addFormOpen = true;
  addFormValue = '';
  courses = [{ id: nextCourseId++, name: '' }];
  courses.pop();
  render();
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 2400);
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-lang') === l));
  render();
}
function toggleMode() {
  isPopulated = !isPopulated;
  initData();
  render();
}

initData();
render();
</script>
