
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  .bo { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f5; min-height: 100vh; display: flex; }
  .sidebar { width: 192px; background: #1a1a2e; flex-shrink: 0; padding: 16px 0; }
  .sidebar-logo { color: #fff; font-size: 13px; font-weight: 500; padding: 0 16px 20px; opacity: 0.9; }
  .sidebar-item { font-size: 13px; color: rgba(255,255,255,0.5); padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
  .sidebar-item.active { color: #fff; background: rgba(255,255,255,0.1); }
  .sidebar-item.expanded { color: rgba(255,255,255,0.75); }

  .sidebar-sub { font-size: 12px; color: rgba(255,255,255,0.45); padding: 6px 16px 6px 38px; cursor: pointer; }

  .main { flex: 1; padding: 36px 48px; overflow: auto; max-width: 1180px; }

  .lang-toggle { display: inline-flex; border: 0.5px solid #d0d0c8; border-radius: 999px; overflow: hidden; background: #fff; }
  .lang-btn { padding: 4px 12px; background: transparent; border: none; color: #888; cursor: pointer; font-size: 11px; font-weight: 500; font-family: inherit; }
  .lang-btn.active { background: #534AB7; color: #fff; }
  .demo-toggle { font-size: 11px; color: #aaa; cursor: pointer; }

  .page-title { font-size: 22px; font-weight: 500; color: #1a1a2e; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: #666; margin-bottom: 24px; max-width: 560px; }

  .panels { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
  .panel { background: #fff; border: 0.5px solid #e0e0da; border-radius: 12px; overflow: hidden; }
  .panel-head { padding: 14px 18px; border-bottom: 0.5px solid #e0e0da; display: flex; justify-content: space-between; align-items: center; }
  .panel-title { font-size: 13px; font-weight: 500; color: #1a1a2e; }
  .panel-count { font-size: 11px; color: #888; }

  .courses-list { padding: 6px; min-height: 100px; }
  .course-row { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; transition: background 0.12s; border: 1px solid transparent; }
  .course-row.draggable { cursor: move; }
  .course-row:hover.draggable { background: #f7f7f5; }
  .course-row.dragging { opacity: 0.4; }
  .course-row.drop-before { border-top-color: #534AB7; }
  .course-row.drop-after { border-bottom-color: #534AB7; }
  .course-handle { color: #ccc; font-size: 14px; width: 12px; flex-shrink: 0; text-align: center; line-height: 1; }
  .course-row.other .course-handle { visibility: hidden; }
  .course-nr { font-size: 11px; font-weight: 500; color: #534AB7; background: #EEEDFE; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .course-row.other .course-nr { background: #f0f0ec; color: #999; }

  .course-del:hover { color: #c94b4b; background: #fdf0f0; }

  .articles-scroll { max-height: 520px; overflow-y: auto; }

  .articles-table th { text-align: left; font-size: 10px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 14px; background: #fafafa; border-bottom: 0.5px solid #e0e0da; position: sticky; top: 0; cursor: pointer; user-select: none; }

};

let lang = 'sv';
let isPopulated = true;
let nextCourseId = 100;
let courses = [];
let articles = [];
let draggedCourseId = null;
let addFormOpen = false;
let addFormValue = '';
let searchQuery = '';
let courseFilter = 'all';
let selected = new Set();
let sortKey = 'name';
let sortDir = 'asc';

function t(key, vars) {
  let s = (translations[lang] && translations[lang][key]) || key;
  if (vars) for (const k in vars) s = s.replace('{' + k + '}', vars[k]);
  return s;
}

function initData() {
  nextCourseId = 100;
  if (isPopulated) {
    courses = [
      { id: 1, name: 'Förrätter' },
      { id: 2, name: 'Varmrätter' },
      { id: 3, name: 'Desserter' },
      { id: 4, name: 'Drycker' }
    ];
    articles = [
      { id: 1, name: 'Beef Tartare', category: 'Starters', courseId: 1 },
      { id: 2, name: 'Scallop Ceviche', category: 'Starters', courseId: 1 },
      { id: 3, name: 'Beet Salad', category: 'Starters', courseId: 1 },
      { id: 4, name: 'Tuna Crudo', category: 'Starters', courseId: 1 },
      { id: 5, name: 'Dover Sole', category: 'Fish', courseId: 2 },
      { id: 6, name: 'Rack of Lamb', category: 'Meat', courseId: 2 },
      { id: 7, name: 'Duck Confit', category: 'Meat', courseId: 2 },
      { id: 8, name: 'Wild Mushroom Risotto', category: 'Vegetarian', courseId: 2 },
      { id: 9, name: 'Cheese Plate', category: 'Desserts', courseId: 3 },
      { id: 10, name: 'Chocolate Mousse', category: 'Desserts', courseId: 3 },
      { id: 11, name: 'Crème Brûlée', category: 'Desserts', courseId: 3 },
      { id: 12, name: 'Chablis', category: 'Wine', courseId: 4 },
      { id: 13, name: 'Pripps Blå', category: 'Beer', courseId: 4 },
      { id: 14, name: 'Espresso', category: 'Hot drinks', courseId: 4 },
      { id: 15, name: 'House Red', category: 'Wine', courseId: 4 },
      { id: 16, name: 'Bread Basket', category: 'Sides', courseId: null },
      { id: 17, name: 'Olive Plate', category: 'Sides', courseId: null }
    ];
  } else {
    courses = [];
    articles = [
      { id: 1, name: 'Beef Tartare', category: 'Starters', courseId: null },
      { id: 2, name: 'Scallop Ceviche', category: 'Starters', courseId: null },
      { id: 3, name: 'Dover Sole', category: 'Fish', courseId: null },
      { id: 4, name: 'Rack of Lamb', category: 'Meat', courseId: null },
      { id: 5, name: 'Cheese Plate', category: 'Desserts', courseId: null },
      { id: 6, name: 'Chablis', category: 'Wine', courseId: null },
      { id: 7, name: 'Pripps Blå', category: 'Beer', courseId: null },
      { id: 8, name: 'Bread Basket', category: 'Sides', courseId: null }
    ];
  }
  selected = new Set();
  searchQuery = '';
  courseFilter = 'all';
  addFormOpen = false;
  addFormValue = '';
}

function articlesInCourse(courseId) {
  if (courseId === null) return articles.filter(a => a.courseId === null);
  return articles.filter(a => a.courseId === courseId);
}

function visibleArticles() {
  let list = articles.slice();
  if (courseFilter === 'unmapped') list = list.filter(a => a.courseId === null);
  else if (courseFilter !== 'all') {
    const cid = courseFilter === 'other' ? null : Number(courseFilter);
    list = list.filter(a => a.courseId === cid);
  }
  if (searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    list = list.filter(a => a.name.toLowerCase().includes(q) || a.category.toLowerCase().includes(q));
  }
  list.sort((a, b) => {
    let va, vb;
    if (sortKey === 'name') { va = a.name; vb = b.name; }
    else if (sortKey === 'category') { va = a.category; vb = b.category; }
    else if (sortKey === 'course') { va = courseNameFor(a.courseId); vb = courseNameFor(b.courseId); }
    const cmp = String(va).localeCompare(String(vb));
    return sortDir === 'asc' ? cmp : -cmp;
  });
  return list;
}

function courseNameFor(id) {
  if (id === null) return t('courses.other');
  const c = courses.find(c => c.id === id);
  return c ? c.name : t('courses.other');
}

function renderSidebar() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.getElementById('modeLabel').textContent = t(isPopulated ? 'demo.populated' : 'demo.empty');
  document.documentElement.lang = lang;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function render() {
  renderSidebar();
  const root = document.getElementById('content');
  if (courses.length === 0) {
    root.innerHTML = renderEmptyState();
    return;
  }
  root.innerHTML = `
    <div class="panels">
      ${renderCoursesPanel()}
      ${renderArticlesPanel()}
    </div>
  `;
  attachHandlers();
}

function renderEmptyState() {
  return `
    <div class="panel">
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 6h12M4 10h12M4 14h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <div class="empty-title">${t('empty.title')}</div>
        <div class="empty-desc">${t('empty.desc')}</div>
        <div class="empty-actions">
          <button class="btn-p" onclick="applyStandardTemplate()">${t('empty.useTemplate')}</button>
          <button class="btn-g" onclick="startFromScratch()">${t('empty.startScratch')}</button>
        </div>
      </div>
    </div>
  `;
}

function renderCoursesPanel() {
  const total = courses.length;
  const rows = courses.map((c, i) => {
    const count = articlesInCourse(c.id).length;
    const countText = count === 1 ? t('courses.articleCount.one') : t('courses.articleCount', { n: count });
    return `
      <div class="course-row draggable" draggable="true" data-cid="${c.id}">
        <span class="course-handle">⋮⋮</span>
        <div class="course-nr">${i + 1}</div>
        <div class="course-name-wrap">
          <div class="course-name">${escapeHtml(c.name)}</div>
          <div class="course-count">${countText}</div>
        </div>
        <button class="course-del" data-cid="${c.id}" title="${t('confirm.delete.confirm')}">×</button>
      </div>
    `;
  }).join('');
  const otherCount = articlesInCourse(null).length;
  const otherText = otherCount === 1 ? t('courses.articleCount.one') : t('courses.articleCount', { n: otherCount });
  const otherRow = `
    <div class="course-divider"></div>
    <div class="course-row other">
      <span class="course-handle">⋮⋮</span>
      <div class="course-nr">–</div>
      <div class="course-name-wrap">
        <div class="course-name">${t('courses.other')}</div>
        <div class="course-count">${otherText}</div>
      </div>
      <button class="course-del" style="visibility:hidden">×</button>
    </div>
  `;
  const addForm = addFormOpen ? renderAddForm() : `
    <div class="add-course-row">
      <button class="add-course-btn" onclick="openAddForm()">${t('courses.addBtn')}</button>
    </div>
  `;
  return `
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">${t('courses.title')}</div>
        <div class="panel-count">${t('courses.count', { n: total })}</div>
      </div>
      <div class="courses-list">
        ${rows}
        ${otherRow}
      </div>
      ${addForm}
    </div>
  `;
}

function renderAddForm() {
  const templates = [
    { key: 'course.tpl.appetizers' },
    { key: 'course.tpl.mains' },
    { key: 'course.tpl.desserts' },
    { key: 'course.tpl.drinks' }
  ];
  const chips = templates.map(tpl => `<button class="chip" onclick="useTemplate('${tpl.key}')">${t(tpl.key)}</button>`).join('');
  const canSave = addFormValue.trim().length > 0;
  return `
    <div class="add-course-form">
      <input id="addInput" type="text" placeholder="${t('courses.form.placeholder')}" value="${escapeHtml(addFormValue)}" autofocus />
      <div class="template-label">${t('courses.form.templates')}</div>
      <div class="template-chips">${chips}</div>
      <div class="add-actions">
        <button class="btn-g" onclick="cancelAdd()">${t('courses.form.cancel')}</button>
        <button class="btn-p" onclick="saveAdd()" ${canSave ? '' : 'disabled'}>${t('courses.form.save')}</button>
      </div>
    </div>
  `;
}

function renderArticlesPanel() {
  const list = visibleArticles();
  const selectedCount = list.filter(a => selected.has(a.id)).length;
  const filterOptions = [
    `<option value="all">${t('articles.filterAll')}</option>`,
    `<option value="unmapped">${t('articles.filterUnmapped')}</option>`,
    ...courses.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`),
    `<option value="other">${t('courses.other')}</option>`
  ].map(o => {
    const val = o.match(/value="([^"]+)"/)[1];
    if (val === courseFilter) return o.replace('<option', '<option selected');
    return o;
  }).join('');
  const bulkOptions = [
    `<option value="">${t('bulk.choose')}</option>`,
    ...courses.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`),
    `<option value="other">${t('courses.other')}</option>`
  ].join('');
  const rows = list.length === 0
    ? `<tr><td colspan="4" style="text-align:center;color:#888;padding:40px 14px;">${t('articles.empty')}</td></tr>`
    : list.map(a => {
        const checked = selected.has(a.id) ? 'checked' : '';
        const selClass = selected.has(a.id) ? ' class="selected"' : '';
        const courseDropdown = renderCourseDropdown(a);
        return `
          <tr${selClass}>
            <td class="col-check"><input type="checkbox" data-aid="${a.id}" ${checked}></td>
            <td>${escapeHtml(a.name)}</td>
            <td class="col-category">${escapeHtml(a.category)}</td>
            <td class="col-course">${courseDropdown}</td>
          </tr>
        `;
      }).join('');
  const sortArrow = dir => dir === 'asc' ? '↑' : '↓';
  const th = (key, label) => {
    const isSorted = sortKey === key;
    return `<th class="${isSorted ? 'sorted' : ''}" data-sort="${key}">${label} <span class="sort-arrow">${isSorted ? sortArrow(sortDir) : '↕'}</span></th>`;
  };
  const bulk = selected.size > 0 ? `
    <div class="bulk-bar">
      <div class="bulk-bar-left">
        <span>${t('bulk.selected', { n: selected.size })}</span>
        <span>${t('bulk.assignTo')}</span>
        <select id="bulkAssign" onchange="doBulkAssign(this.value)">${bulkOptions}</select>
      </div>
      <button class="bulk-link" onclick="clearSelection()">${t('bulk.clear')}</button>
    </div>
  ` : '';
  return `
    <div class="panel articles-panel">
      <div class="articles-head">
        <div class="search-wrap">
          <span class="search-icon">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 8l2.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </span>
          <input id="searchInput" type="text" placeholder="${t('articles.search')}" value="${escapeHtml(searchQuery)}">
        </div>
        <select id="filterSelect" class="filter-select">${filterOptions}</select>
      </div>
      ${bulk}
      <div class="articles-scroll">
        <table class="articles-table">
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="selectAll" ${list.length > 0 && selectedCount === list.length ? 'checked' : ''}></th>
              ${th('name', t('articles.th.name'))}
              ${th('category', t('articles.th.category'))}
              ${th('course', t('articles.th.course'))}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderCourseDropdown(a) {
  const opts = courses.map(c =>
    `<option value="${c.id}" ${a.courseId === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
  ).join('');
  const otherOpt = `<option value="other" ${a.courseId === null ? 'selected' : ''}>${t('courses.other')}</option>`;
  const cls = a.courseId === null ? 'course-dropdown is-other' : 'course-dropdown';
  return `<select class="${cls}" data-aid="${a.id}" onchange="assignArticle(${a.id}, this.value)">${opts}${otherOpt}</select>`;
}

function attachHandlers() {
  const search = document.getElementById('searchInput');
  if (search) {
    search.addEventListener('input', e => { searchQuery = e.target.value; const pos = e.target.selectionStart; render(); const s = document.getElementById('searchInput'); if (s) { s.focus(); s.setSelectionRange(pos, pos); } });
  }
  const filter = document.getElementById('filterSelect');
  if (filter) {
    filter.addEventListener('change', e => { courseFilter = e.target.value; selected = new Set(); render(); });
  }
  const selectAll = document.getElementById('selectAll');
  if (selectAll) {
    selectAll.addEventListener('change', e => {
      const list = visibleArticles();
      if (e.target.checked) list.forEach(a => selected.add(a.id));
      else list.forEach(a => selected.delete(a.id));
      render();
    });
  }
  document.querySelectorAll('input[type="checkbox"][data-aid]').forEach(el => {
    el.addEventListener('change', e => {
      const id = Number(e.target.getAttribute('data-aid'));
      if (e.target.checked) selected.add(id);
      else selected.delete(id);
      render();
    });
  });
  document.querySelectorAll('.articles-table th[data-sort]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.getAttribute('data-sort');
      if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortKey = key; sortDir = 'asc'; }
      render();
    });
  });
  document.querySelectorAll('.course-del[data-cid]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = Number(el.getAttribute('data-cid'));
      askDeleteCourse(id);
    });
  });
  document.querySelectorAll('.course-row.draggable').forEach(el => {
    el.addEventListener('dragstart', handleDragStart);
    el.addEventListener('dragend', handleDragEnd);
    el.addEventListener('dragover', handleDragOver);
    el.addEventListener('dragleave', handleDragLeave);
    el.addEventListener('drop', handleDrop);
  });
  const addInput = document.getElementById('addInput');
  if (addInput) {
    addInput.addEventListener('input', e => { addFormValue = e.target.value; const btn = document.querySelector('.add-course-form .btn-p'); if (btn) btn.disabled = !addFormValue.trim(); });
    addInput.addEventListener('keydown', e => { if (e.key === 'Enter' && addFormValue.trim()) saveAdd(); else if (e.key === 'Escape') cancelAdd(); });
    addInput.focus();
    addInput.setSelectionRange(addInput.value.length, addInput.value.length);
  }
}

function handleDragStart(e) {
  draggedCourseId = Number(e.currentTarget.getAttribute('data-cid'));
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function handleDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.course-row').forEach(r => r.classList.remove('drop-before', 'drop-after'));
  draggedCourseId = null;
}
function handleDragOver(e) {
  if (draggedCourseId === null) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  const targetId = Number(row.getAttribute('data-cid'));
  if (targetId === draggedCourseId) return;
  const rect = row.getBoundingClientRect();
  const before = e.clientY < rect.top + rect.height / 2;
  row.classList.toggle('drop-before', before);
  row.classList.toggle('drop-after', !before);
}
function handleDragLeave(e) {
  e.currentTarget.classList.remove('drop-before', 'drop-after');
}
function handleDrop(e) {
  if (draggedCourseId === null) return;
  e.preventDefault();
  const row = e.currentTarget;
  const targetId = Number(row.getAttribute('data-cid'));
  if (targetId === draggedCourseId) return;
  const rect = row.getBoundingClientRect();
  const before = e.clientY < rect.top + rect.height / 2;
  const fromIdx = courses.findIndex(c => c.id === draggedCourseId);
  const moved = courses.splice(fromIdx, 1)[0];
  const toIdx = courses.findIndex(c => c.id === targetId);
  courses.splice(before ? toIdx : toIdx + 1, 0, moved);
  render();
}

function openAddForm() { addFormOpen = true; addFormValue = ''; render(); }
function cancelAdd() { addFormOpen = false; addFormValue = ''; render(); }
function useTemplate(key) {
  addFormValue = t(key);
  render();
  setTimeout(() => { const i = document.getElementById('addInput'); if (i) i.focus(); }, 0);
}
function saveAdd() {
  const name = addFormValue.trim();
  if (!name) return;
  const newCourse = { id: nextCourseId++, name };
  courses.push(newCourse);
  addFormOpen = false;
  addFormValue = '';
  render();
  showToast(t('toast.courseAdded', { name }));
}

function askDeleteCourse(id) {
  const c = courses.find(x => x.id === id);
  if (!c) return;
  const mount = document.getElementById('confirmMount');
  mount.innerHTML = `
    <div class="confirm-overlay" onclick="if(event.target===this)closeConfirm()">
      <div class="confirm-box">
        <div class="confirm-title">${t('confirm.delete.title', { name: escapeHtml(c.name) })}</div>
        <div class="confirm-desc">${t('confirm.delete.desc')}</div>
        <div class="confirm-actions">
          <button class="btn-g" onclick="closeConfirm()">${t('confirm.delete.cancel')}</button>
          <button class="btn-p" onclick="confirmDelete(${id})">${t('confirm.delete.confirm')}</button>
        </div>
      </div>
    </div>
  `;
}
function closeConfirm() { document.getElementById('confirmMount').innerHTML = ''; }
function confirmDelete(id) {
  const c = courses.find(x => x.id === id);
  if (!c) { closeConfirm(); return; }
  const name = c.name;
  articles.forEach(a => { if (a.courseId === id) a.courseId = null; });
  courses = courses.filter(x => x.id !== id);
  closeConfirm();
  render();
  showToast(t('toast.courseDeleted', { name }));
}

function assignArticle(aid, value) {
  const a = articles.find(x => x.id === aid);
  if (!a) return;
  a.courseId = value === 'other' ? null : Number(value);
  render();
}

function doBulkAssign(value) {
  if (!value) return;
  const targetId = value === 'other' ? null : Number(value);
  const targetName = targetId === null ? t('courses.other') : courses.find(c => c.id === targetId).name;
  let n = 0;
  selected.forEach(aid => {
    const a = articles.find(x => x.id === aid);
    if (a) { a.courseId = targetId; n++; }
  });
  selected = new Set();
  render();
  showToast(t('toast.assigned', { n, name: targetName }));
}

function clearSelection() { selected = new Set(); render(); }

function applyStandardTemplate() {
  courses = [
    { id: nextCourseId++, name: t('course.tpl.appetizers') },
    { id: nextCourseId++, name: t('course.tpl.mains') },
    { id: nextCourseId++, name: t('course.tpl.desserts') },
    { id: nextCourseId++, name: t('course.tpl.drinks') }
  ];
  render();
  showToast(t('toast.templateApplied'));
}
function startFromScratch() {
  addFormOpen = true;
  addFormValue = '';
  courses = [{ id: nextCourseId++, name: '' }];
  courses.pop();
  render();
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 2400);
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-lang') === l));
  render();
}
function toggleMode() {
  isPopulated = !isPopulated;
  initData();
  render();
}

initData();
render();
</script>
